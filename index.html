<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CHOICE — 30 дней</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #FFD700; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 10px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 480px; width: 100%; margin: 0 auto; }
        .card { background-color: #000000; border-radius: 28px; padding: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        .screen { min-height: 560px; display: none; flex-direction: column; }
        .screen.active { display: flex; }
        #trackerScreen, #historyScreen, #achievementsScreen, #settingsScreen { min-height: 560px; }
        
        .welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #FFD700; display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .welcome-card { background-color: #000000; border-radius: 28px; padding: 20px; max-width: 280px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .welcome-logo { font-size: 2rem; font-weight: 900; color: #FFD700; background-color: #1a1a1a; display: inline-block; padding: 6px 18px; border-radius: 50px; margin-bottom: 12px; }
        .welcome-title { color: #FFD700; font-size: 1rem; font-weight: bold; margin-bottom: 8px; }
        .welcome-text { color: #cccccc; font-size: 0.75rem; line-height: 1.3; text-align: left; margin: 10px 0; }
        .welcome-text p { margin: 4px 0; }
        .welcome-btn { background-color: #FFD700; color: #000000; border: none; padding: 8px 16px; font-size: 0.85rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: transform 0.1s; }
        .welcome-btn:active { transform: scale(0.97); }
        .hidden { display: none; }
        
        .bottom-nav { margin-top: 8px; display: flex; gap: 6px; background-color: #000000; border-radius: 40px; padding: 5px; }
        .nav-btn { flex: 1; background-color: #1a1a1a; color: #FFD700; border: none; padding: 7px 0; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 0.7rem; transition: all 0.1s; }
        .nav-btn.active { background-color: #FFD700; color: #000000; }
        .nav-btn:active { transform: scale(0.96); }
        
        .logo { font-size: 1.1rem; font-weight: 900; color: #FFD700; background-color: #1a1a1a; display: inline-block; padding: 4px 12px; border-radius: 40px; margin-bottom: 8px; }
        .stats-cards { display: flex; gap: 6px; margin: 8px 0; }
        .stat-card { background-color: #1a1a1a; border-radius: 12px; padding: 6px; flex: 1; text-align: center; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: #FFD700; }
        .stat-label { font-size: 0.5rem; color: #aaa; }
        .progress-bar-container { background-color: #1a1a1a; border-radius: 20px; height: 6px; margin: 8px 0; overflow: hidden; }
        .progress-fill { background-color: #2e7d32; width: 0%; height: 100%; transition: width 0.3s; }
        .progress-text { color: #FFD700; font-size: 0.6rem; text-align: center; margin-bottom: 3px; }
        .current-day-text { color: #FFD700; margin: 5px 0; font-size: 0.7rem; text-align: center; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin: 8px 0; }
        .day-cell { background-color: #1a1a1a; color: #FFD700; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: bold; font-size: 0.75rem; cursor: pointer; transition: all 0.1s; }
        .day-cell.completed { background-color: #2e7d32; color: white; }
        .day-cell.current { border: 2px solid #FFD700; }
        .day-cell:active { transform: scale(0.94); }
        
        .action-panel { display: flex; gap: 6px; margin: 8px 0; }
        .action-btn { flex: 1; padding: 8px; border: none; border-radius: 40px; font-weight: bold; font-size: 0.7rem; cursor: pointer; transition: all 0.1s; }
        .action-btn:active { transform: scale(0.96); }
        .success-btn { background-color: #2e7d32; color: white; }
        .fail-btn { background-color: #8b0000; color: white; }
        .help-btn { background-color: #FF5722; color: white; }
        .reset-btn { background-color: #8b0000; color: white; border: none; padding: 7px; border-radius: 25px; width: 100%; margin-top: 6px; cursor: pointer; font-size: 0.65rem; font-weight: bold; }
        .reset-btn:active { transform: scale(0.97); }
        
        .history-list, .achievements-list { max-height: 400px; overflow-y: auto; scrollbar-width: none; margin-top: 4px; }
        .history-list::-webkit-scrollbar, .achievements-list::-webkit-scrollbar { display: none; }
        .history-item, .achievement-item { background-color: #1a1a1a; border-radius: 12px; padding: 6px; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; cursor: pointer; border: 1px solid #333; }
        .achievement-item.completed { border-color: #FFD700; }
        .achievement-icon { font-size: 1.2rem; min-width: 28px; text-align: center; }
        .achievement-info { flex: 1; }
        .achievement-title { color: #FFD700; font-weight: bold; font-size: 0.65rem; }
        .achievement-status { font-size: 0.5rem; color: #666; }
        .achievement-date { font-size: 0.5rem; color: #2e7d32; }
        
        .history-date, .history-days, .history-end { color: white; }
        .history-end { color: #ff8888; }
        
        .setting-item { margin-bottom: 8px; }
        .setting-label { color: #FFD700; display: block; margin-bottom: 3px; font-weight: bold; font-size: 0.65rem; }
        select { width: 100%; padding: 6px; border-radius: 25px; background-color: #1a1a1a; color: #FFD700; font-size: 0.7rem; border: 1px solid #FFD700; }
        .support-btn { width: 100%; background-color: #1a1a1a; color: #FFD700; border: 1px solid #FFD700; padding: 6px; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 0.65rem; }
        .support-btn:active { transform: scale(0.97); }
        
        .emergency-modal, .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); display: flex; align-items: center; justify-content: center; z-index: 4000; cursor: pointer; }
        .emergency-card { background: #1a1a1a; border-radius: 24px; padding: 18px; max-width: 280px; width: 90%; text-align: center; border: 2px solid #FF5722; }
        .emergency-card * { color: white; }
        .emergency-warning { color: #FF5722; font-size: 1rem; font-weight: bold; margin-bottom: 8px; }
        .emergency-text { color: #ccc; font-size: 0.75rem; margin: 8px 0; text-align: left; }
        .emergency-steps { text-align: left; margin: 8px 0; }
        .emergency-step { color: white !important; margin: 6px 0; font-size: 0.7rem; font-weight: bold; }
        .timer-display { font-size: 1.4rem; font-weight: bold; color: #FF5722; margin: 8px 0; }
        .emergency-btn { background-color: #FF5722; color: white; border: none; padding: 8px; border-radius: 40px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 6px; font-size: 0.8rem; }
        .emergency-btn:active { transform: scale(0.97); }
        .emergency-btn.secondary { background-color: #333; margin-top: 6px; }
        
        .modal-content { background: #1a1a1a; border-radius: 24px; padding: 18px; max-width: 280px; width: 90%; text-align: center; border: 2px solid #FF5722; }
        .quote-text { font-size: 0.85rem; color: #FFD700; margin: 8px 0; }
        .modal-content button { background-color: #FFD700; color: #000; border: none; padding: 6px 14px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 4px; }
        .modal-content button:active { transform: scale(0.96); }
        .modal-content button#cancel { background-color: #333; color: #FFD700; border: 1px solid #FFD700; }
        .modal-content button#save { background-color: #FF5722; color: white; }
        .modal-content h3 { color: #FFD700; margin-bottom: 6px; font-size: 0.9rem; }
        .modal-content textarea { width: 100%; padding: 6px; border-radius: 12px; background: #000; color: white; border: 1px solid #FFD700; margin: 6px 0; font-size: 0.7rem; font-family: inherit; }
        .modal-content textarea::placeholder { color: #888; }
        
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { max-width: 560px; }
            .card { padding: 20px; }
            .screen { min-height: 600px; }
            #trackerScreen, #historyScreen, #achievementsScreen, #settingsScreen { min-height: 600px; }
            .day-cell { font-size: 0.95rem; }
            .action-btn { padding: 10px; font-size: 0.85rem; }
            .stat-value { font-size: 1.4rem; }
            .history-list, .achievements-list { max-height: 440px; }
        }
    </style>
</head>
<body>

<div id="welcomeScreen" class="welcome-screen">
    <div class="welcome-card">
        <div class="welcome-logo">CHOICE</div>
        <div class="welcome-title">Твой 30-дневный вызов</div>
        <div class="welcome-text">
            <p>⚔️ 30 дней без оправданий</p>
            <p>✅ Нажми «Выполнил» — день зелёный</p>
            <p>❌ Сорвался? Новая попытка, дни в копилку</p>
            <p>🔥 Лучшая серия — твоя история</p>
        </div>
        <button class="welcome-btn" id="welcomeBtn">Начать путь →</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div id="trackerScreen" class="screen active">
            <div class="logo">CHOICE</div>
            <div class="stats-cards">
                <div class="stat-card"><div class="stat-value" id="totalDaysStat">0</div><div class="stat-label">всего дней</div></div>
                <div class="stat-card"><div class="stat-value" id="bestStreakStat">0</div><div class="stat-label">лучшая серия</div></div>
                <div class="stat-card"><div class="stat-value" id="attemptsStat">0</div><div class="stat-label">попыток</div></div>
            </div>
            <div class="progress-text" id="progressPercent">0% завершено</div>
            <div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div>
            <div class="current-day-text" id="currentDayText">День 1 из 30</div>
            <div class="grid" id="daysGrid"></div>
            <div class="action-panel">
                <button class="action-btn success-btn" id="completeBtn">✅ Выполнил</button>
                <button class="action-btn fail-btn" id="failBtn">❌ Сорвался</button>
                <button class="action-btn help-btn" id="helpBtn">🆘 ПОМОГИТЕ</button>
            </div>
            <button class="reset-btn" id="manualResetBtn">🔄 Начать новую попытку</button>
        </div>

        <div id="historyScreen" class="screen">
            <div class="logo">📜 История</div>
            <div id="historyList" class="history-list"><div style="color:#666; text-align:center; padding:15px;">Нет попыток</div></div>
        </div>

        <div id="achievementsScreen" class="screen">
            <div class="logo">🏆 Достижения</div>
            <div id="achievementsList" class="achievements-list"></div>
        </div>

        <div id="settingsScreen" class="screen">
            <div class="logo">⚙️ Настройки</div>
            <div class="setting-item">
                <label class="setting-label">🌐 Язык</label>
                <select id="languageSelect"><option value="ru">Русский</option><option value="en">English</option></select>
            </div>
            <div class="setting-item">
                <label class="setting-label">💬 Поддержка</label>
                <button class="support-btn" id="supportBtn">✉️ Связаться с автором</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" data-screen="tracker">📅 Трекер</button>
        <button class="nav-btn" data-screen="history">📋 История</button>
        <button class="nav-btn" data-screen="achievements">🏆 Достижения</button>
        <button class="nav-btn" data-screen="settings">⚙️ Настройки</button>
    </div>
</div>

<script>
    const quotes = {
        1: "Первый день — самый простой. Не обманывай себя.",
        2: "Твой мозг ещё не понял, что ты серьёзно. Покажи ему.",
        3: "Три дня. Это больше, чем 90% мужчин. Но ты не они.",
        4: "Если тебе легко — ты делаешь что-то не так. Должно ломать.",
        5: "Пять дней. Твоя бывшая версия уже не узнала бы тебя.",
        6: "Триггеры не исчезли. Ты просто стал сильнее их замечать.",
        7: "Первая неделя — грязь. Ты прошёл её. Дальше — холод.",
        8: "Мозг захочет сделку. Не торгуйся.",
        9: "Сублимация — не терпи. Переплавляй похоть в действие.",
        10: "Десять дней. Дофаминовые рецепторы начали просыпаться.",
        11: "Не запрещай. Заменяй. Ты умнее своего инстинкта.",
        12: "Охлаждение — не шутка. Сделай. Прямо сейчас.",
        13: "Сон — твоя перезагрузка. Не кради её у себя.",
        14: "Две недели. Ты уже не тот, кем был 14 дней назад.",
        15: "Пик ломки. Если ты здесь — ты пройдёшь всё.",
        16: "Не проверяй 'а работает ли ещё'. Работает.",
        17: "Утренняя эрекция — не враг. Это знак восстановления.",
        18: "Эротический сон — не срыв. Твоё тело лечится.",
        19: "Энергия прёт. Не сиди. Делай. Сейчас.",
        20: "Женщины чувствуют твою силу. Не сливай её на первую встречную.",
        21: "Три недели. Ты перестроил нейронные сети. Гордись. Но не расслабляйся.",
        22: "Чувствительность вернулась. Теперь ты снова мужчина.",
        23: "Злость — это топливо. Сожги её в деле, а не в унитаз.",
        24: "Тестостерон на пике. Твой голос стал глубже.",
        25: "Люди тянутся к тебе. Ты стал магнитом.",
        26: "Осталось 4 дня. Ты не сдашься за четыре дня.",
        27: "Энергия переполняет. Это суперсила.",
        28: "Стресс — не оправдание. Стресс — это проверка.",
        29: "Один день. Ты прошёл 29. Не сломайся.",
        30: "Ты сделал выбор 30 раз. Ты — мужчина."
    };

    const achievementsConfig = {
        5: { name: "🥉 Первый рубеж", message: "Ты прошёл 5 дней. 90% мужчин срываются раньше. Ты — в топ‑10.", extra: "3 фразы-бронежилета:\n1. НЕТ. Я не торгуюсь.\n2. Это не награда, это ловушка.\n3. Позыв уйдёт через 15 минут, стыд останется навсегда." },
        10: { name: "🥈 Двойной рубеж", message: "Десять дней. Дофаминовые рецепторы начали просыпаться. Мир становится ярче.", extra: "10 признаков, что твой мозг перестраивается:\n🔲 Просыпаешься бодрее\n🔲 Голос стал глубже\n🔲 Женщины чаще смотрят в глаза\n🔲 Туман в голове рассеялся\n🔲 Легче начинать дела\n🔲 Злость направил в спорт/работу\n🔲 Энергии хватает до вечера\n🔲 Снятся яркие сны\n🔲 Меньше тяги к скроллингу\n🔲 Чувствуешь уважение к себе" },
        20: { name: "🥇 Пик перелома", message: "20 дней. Ты перешёл точку невозврата.\n✅ Тестостерон на 30–40% выше среднего\n✅ Кортизол упал\n✅ Дофаминовые рецепторы восстановились на 70%\n✅ Мимика, жесты, голос стали увереннее", extra: "Дыхание '4-7-8' против срыва:\nВдох на 4 сек → задержка 7 сек → выдох 8 сек.\nПовтори 5 раз. Убивает тревогу за 1 минуту." },
        30: { name: "🏆 Победа Choice", message: "ТЫ СДЕЛАЛ ЭТО. 30 дней. Ты — мужчина.", extra: "Также тебе доступен доступ к следующему моему проекту со скидкой в 50%. Все дальнейшие курсы и трекеры будут в канале ManUP → https://t.me/+yNTzArXO1RJjY2Ri" }
    };

    let currentAttempt = { startDate: null, completedDays: [] };
    let totalDays = 0, bestStreak = 0, attemptsHistory = [];
    let achievements = JSON.parse(localStorage.getItem('choice_achievements') || '{}');
    let settings = JSON.parse(localStorage.getItem('choice_settings') || '{"language":"ru"}');
    let hasSeenWelcome = localStorage.getItem('choice_welcome_seen');

    function initWelcome() {
        if (hasSeenWelcome) { document.getElementById('welcomeScreen').classList.add('hidden'); return; }
        document.getElementById('welcomeScreen').classList.remove('hidden');
        document.getElementById('welcomeBtn').onclick = () => {
            localStorage.setItem('choice_welcome_seen', 'true');
            document.getElementById('welcomeScreen').classList.add('hidden');
            if (!currentAttempt.startDate) { currentAttempt.startDate = new Date().toISOString(); saveData(); renderAll(); }
        };
    }

    function loadData() {
        const saved = localStorage.getItem('choice_data_v2');
        if (saved) { const data = JSON.parse(saved); currentAttempt = data.currentAttempt || { startDate: null, completedDays: [] }; totalDays = data.totalDays || 0; bestStreak = data.bestStreak || 0; attemptsHistory = data.attemptsHistory || []; }
        if (!hasSeenWelcome && currentAttempt.startDate) localStorage.setItem('choice_welcome_seen', 'true');
        if (!currentAttempt.startDate && hasSeenWelcome) { currentAttempt.startDate = new Date().toISOString(); saveData(); }
    }

    function saveData() { localStorage.setItem('choice_data_v2', JSON.stringify({ currentAttempt, totalDays, bestStreak, attemptsHistory })); }
    function saveAchievements() { localStorage.setItem('choice_achievements', JSON.stringify(achievements)); }

    function checkAchievements() { const streak = currentAttempt.completedDays.length; [5,10,20,30].forEach(day => { if (streak >= day && !achievements[day]) { achievements[day] = new Date().toISOString(); saveAchievements(); showAchievementPopup(day); renderAchievements(); } }); }
    function showAchievementPopup(day) { const a = achievementsConfig[day]; showPopup(`🏆 ${a.name}\n\n${a.message}\n\n${a.extra}`); }
    function renderAchievements() { const container = document.getElementById('achievementsList'); if (!container) return; container.innerHTML = ''; [5,10,20,30].forEach(day => { const a = achievementsConfig[day]; const isCompleted = !!achievements[day]; const div = document.createElement('div'); div.className = 'achievement-item' + (isCompleted ? ' completed' : ''); div.innerHTML = `<div class="achievement-icon">${a.name.substring(0,2)}</div><div class="achievement-info"><div class="achievement-title">${a.name}</div><div class="achievement-status">${isCompleted ? '✅ Получено' : '🔒 Ещё не получено'}</div>${isCompleted ? `<div class="achievement-date">${new Date(achievements[day]).toLocaleDateString()}</div>` : ''}</div>`; if (isCompleted) div.onclick = () => showPopup(`${a.message}\n\n${a.extra}`); container.appendChild(div); }); }

    function getCurrentDay() { if (!currentAttempt.startDate) return 1; const start = new Date(currentAttempt.startDate); start.setHours(0,0,0,0); const today = new Date(); today.setHours(0,0,0,0); const diff = Math.floor((today - start) / (1000*60*60*24)) + 1; return Math.min(Math.max(diff, 1), 30); }
    function getProgressPercent() { return (currentAttempt.completedDays.length / 30) * 100; }
    function renderAll() { renderTracker(); renderHistory(); renderAchievements(); }

    function renderTracker() {
        const grid = document.getElementById('daysGrid'); if (!grid) return; grid.innerHTML = ''; const currentDay = getCurrentDay();
        for (let d = 1; d <= 30; d++) { const cell = document.createElement('div'); cell.className = 'day-cell'; if (currentAttempt.completedDays.includes(d)) cell.classList.add('completed'); if (d === currentDay && !currentAttempt.completedDays.includes(d)) cell.classList.add('current'); cell.textContent = d; cell.onclick = () => { if (currentAttempt.completedDays.includes(d)) showPopup(quotes[d]); else if (d === currentDay) showPopup(`Сегодня день ${d}.`); else if (d < currentDay) showPopup(`День ${d} пропущен. Нажми «Выполнил».`); else showPopup(`День ${d} ещё не наступил.`); }; grid.appendChild(cell); }
        const percent = getProgressPercent(); document.getElementById('progressFill').style.width = `${percent}%`; document.getElementById('progressPercent').innerHTML = `${Math.round(percent)}% завершено`; document.getElementById('currentDayText').innerHTML = `📅 День ${getCurrentDay()} из 30`; document.getElementById('totalDaysStat').textContent = totalDays; document.getElementById('bestStreakStat').textContent = bestStreak; document.getElementById('attemptsStat').textContent = attemptsHistory.length;
    }

    function renderHistory() { const container = document.getElementById('historyList'); if (!container) return; if (attemptsHistory.length === 0) { container.innerHTML = '<div style="color:#666; text-align:center; padding:15px;">Нет попыток</div>'; return; } container.innerHTML = ''; [...attemptsHistory].reverse().forEach(att => { const start = new Date(att.startDate).toLocaleDateString(); const end = att.endDate ? new Date(att.endDate).toLocaleDateString() : '—'; const div = document.createElement('div'); div.className = 'history-item'; div.innerHTML = `<div class="history-date">📅 ${start} — ${end}</div><div class="history-days">✅ Выполнено дней: ${att.daysCompleted}</div><div class="history-end">❌ ${att.endReason}</div>`; container.appendChild(div); }); }

    function showPopup(msg) { const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content"><div style="color:#FFD700; white-space:pre-line;">${msg}</div><button>Закрыть</button></div>`; document.body.appendChild(modal); modal.onclick = () => modal.remove(); modal.querySelector('button').onclick = () => modal.remove(); }

    function showReasonModal(callback) { const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<div class="modal-content"><h3>Причина срыва</h3><textarea id="reason" rows="2" placeholder="Напиши причину..."></textarea><div><button id="cancel">◀ ОТМЕНА</button><button id="save">СОХРАНИТЬ ▶</button></div></div>`; document.body.appendChild(modal); modal.querySelector('#save').onclick = () => { const reason = modal.querySelector('#reason').value.trim(); callback(reason || "Не указана"); modal.remove(); }; modal.querySelector('#cancel').onclick = () => modal.remove(); }

    function endAttempt(reason) { attemptsHistory.push({ startDate: currentAttempt.startDate, daysCompleted: currentAttempt.completedDays.length, endReason: reason, endDate: new Date().toISOString() }); currentAttempt = { startDate: new Date().toISOString(), completedDays: [] }; saveData(); renderAll(); }

    function completeDay() { const day = getCurrentDay(); if (day > 30) { showPopup("30 дней завершено!"); return; } if (currentAttempt.completedDays.includes(day)) { showPopup("День уже выполнен"); return; } showPopup(quotes[day]); currentAttempt.completedDays.push(day); totalDays++; if (currentAttempt.completedDays.length > bestStreak) bestStreak = currentAttempt.completedDays.length; saveData(); renderAll(); checkAchievements(); if (currentAttempt.completedDays.length === 30) { setTimeout(() => { showPopup("🏆 Ты прошёл 30 дней! Поздравляю!"); endAttempt("Победа! 30 дней"); }, 500); } }

    function failDay() { const day = getCurrentDay(); if (day > 30) { showPopup("Ты уже прошёл 30 дней"); return; } if (currentAttempt.completedDays.includes(day)) { showPopup("Этот день уже выполнен"); return; } showReasonModal((reason) => { showPopup(`❌ Срыв на дне ${day}\nТвои ${currentAttempt.completedDays.length} дня(ей) ушли в копилку`); endAttempt(`Срыв на дне ${day}. Причина: ${reason}`); }); }

    function manualReset() { if (confirm("Начать новую попытку?")) { if (currentAttempt.completedDays.length > 0) endAttempt("Ручной сброс"); else { currentAttempt.startDate = new Date().toISOString(); saveData(); renderAll(); } } }

    function showEmergency() { const warningModal = document.createElement('div'); warningModal.className = 'emergency-modal'; warningModal.innerHTML = `<div class="emergency-card"><div class="emergency-warning">⚠️ СТОП ⚠️</div><div class="emergency-text">ДРУГ, ЕСЛИ ТЫ НЕ НА ГРАНИ СРЫВА — ЗАКРОЙ.</div><button class="emergency-btn" id="emergencyConfirmBtn">😰 НЕТ, Я НА ГРАНИ</button><button class="emergency-btn secondary" id="emergencyCancelBtn">← НАЗАД</button></div>`; document.body.appendChild(warningModal); warningModal.querySelector('#emergencyConfirmBtn').onclick = () => { warningModal.remove(); showEmergencySteps(); }; warningModal.querySelector('#emergencyCancelBtn').onclick = () => warningModal.remove(); }

    function showEmergencySteps() { 
        let timerSeconds = 900, timerInterval; 
        const stepsModal = document.createElement('div'); 
        stepsModal.className = 'emergency-modal'; 
        stepsModal.innerHTML = `<div class="emergency-card"><div class="emergency-warning" style="color:#FF5722;">🔴 ТЫ НА ГРАНИ</div><div class="emergency-steps"><div class="emergency-step">1. ВСТАНЬ И ВЫЙДИ</div><div class="emergency-step">2. ХОЛОДНАЯ ВОДА</div><div class="emergency-step">3. 20 ПРИСЕДАНИЙ</div><div class="emergency-step">4. ДЫШИ: 4-7-8</div></div><div class="timer-display" id="emergencyTimerDisplay">15:00</div><button class="emergency-btn" id="emergencyRescueBtn">✅ Я СПАСЁН</button></div>`; 
        document.body.appendChild(stepsModal); 
        function updateTimer() { 
            const minutes = Math.floor(timerSeconds / 60); 
            const seconds = timerSeconds % 60; 
            const d = document.getElementById('emergencyTimerDisplay'); 
            if (d) d.textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`; 
            if (timerSeconds <= 0) { 
                if (timerInterval) clearInterval(timerInterval); 
            } else { 
                timerSeconds--; 
            } 
        } 
        timerInterval = setInterval(updateTimer, 1000); 
        updateTimer(); 
        stepsModal.querySelector('#emergencyRescueBtn').onclick = () => { 
            if (timerInterval) clearInterval(timerInterval); 
            stepsModal.remove(); 
            showPopup("✅ Ты справился."); 
               };
    }

    function applyLanguage() { 
        const isRu = settings.language === 'ru'; 
        document.querySelectorAll('.nav-btn').forEach((btn,i) => { 
            const texts = isRu ? ['📅 Трекер','📋 История','🏆 Достижения','⚙️ Настройки'] : ['📅 Tracker','📋 History','🏆 Achievements','⚙️ Settings']; 
            if(btn.dataset.screen === 'tracker') btn.innerHTML = texts[0]; 
            if(btn.dataset.screen === 'history') btn.innerHTML = texts[1]; 
            if(btn.dataset.screen === 'achievements') btn.innerHTML = texts[2]; 
            if(btn.dataset.screen === 'settings') btn.innerHTML = texts[3]; 
        }); 
        document.getElementById('completeBtn').innerHTML = isRu ? '✅ Выполнил' : '✅ Done'; 
        document.getElementById('failBtn').innerHTML = isRu ? '❌ Сорвался' : '❌ Relapse'; 
        document.getElementById('helpBtn').innerHTML = isRu ? '🆘 ПОМОГИТЕ' : '🆘 HELP'; 
        document.getElementById('manualResetBtn').innerHTML = isRu ? '🔄 Начать новую попытку' : '🔄 New attempt'; 
        document.getElementById('historyScreen').querySelector('.logo').innerHTML = isRu ? '📜 История' : '📜 History'; 
        document.getElementById('achievementsScreen').querySelector('.logo').innerHTML = isRu ? '🏆 Достижения' : '🏆 Achievements'; 
        document.getElementById('settingsScreen').querySelector('.logo').innerHTML = isRu ? '⚙️ Настройки' : '⚙️ Settings'; 
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`${screenId}Screen`).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.nav-btn[data-screen="${screenId}"]`).classList.add('active');
        if (screenId === 'history') renderHistory();
        if (screenId === 'achievements') renderAchievements();
    }

    loadData();
    initWelcome();
    renderAll();
    
    document.getElementById('languageSelect').value = settings.language;
    document.getElementById('languageSelect').onchange = () => {
        settings.language = document.getElementById('languageSelect').value;
        localStorage.setItem('choice_settings', JSON.stringify(settings));
        applyLanguage();
    };
    document.getElementById('supportBtn').onclick = () => window.location.href = 'https://t.me/Piholaa';
    applyLanguage();
    document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => switchScreen(btn.dataset.screen));
    document.getElementById('completeBtn').onclick = completeDay;
    document.getElementById('failBtn').onclick = failDay;
    document.getElementById('manualResetBtn').onclick = manualReset;
    document.getElementById('helpBtn').onclick = showEmergency;
</script>
</body>
</html>
